<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Person-in-WiFi-3D — GT Skeleton Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #08080f;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column
    }

    header {
      background: linear-gradient(135deg, #0d0d1a 0%, #151530 100%);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(100, 100, 255, 0.15);
      flex-shrink: 0
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #7c7cff, #ff6ec7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    #file-info {
      font-size: 12px;
      color: #888;
      font-weight: 300
    }

    main {
      flex: 1;
      display: flex;
      min-height: 0
    }

    #video-panel {
      width: 40%;
      background: #0a0a14;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-right: 1px solid rgba(100, 100, 255, 0.1)
    }

    #video-panel video {
      width: 100%;
      height: 100%;
      object-fit: contain
    }

    .placeholder {
      text-align: center;
      padding: 40px;
      opacity: 0.4
    }

    .placeholder svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.3
    }

    .placeholder p {
      font-size: 13px;
      line-height: 1.6
    }

    #skeleton-panel {
      flex: 1;
      position: relative
    }

    #skeleton-panel canvas {
      display: block
    }

    #controls {
      background: linear-gradient(135deg, #0d0d1a, #151530);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid rgba(100, 100, 255, 0.15);
      flex-shrink: 0
    }

    .ctrl-btn {
      background: rgba(120, 120, 255, 0.12);
      border: 1px solid rgba(120, 120, 255, 0.2);
      color: #aaa;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s
    }

    .ctrl-btn:hover {
      background: rgba(120, 120, 255, 0.25);
      color: #fff;
      border-color: rgba(120, 120, 255, 0.4)
    }

    .ctrl-btn.active {
      background: rgba(255, 110, 199, 0.2);
      border-color: rgba(255, 110, 199, 0.4);
      color: #ff6ec7
    }

    #frame-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.08);
      outline: none
    }

    #frame-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c7cff, #ff6ec7);
      cursor: pointer
    }

    #frame-counter {
      font-size: 12px;
      color: #888;
      min-width: 80px;
      text-align: center;
      font-variant-numeric: tabular-nums
    }

    select {
      background: #12121f;
      border: 1px solid rgba(100, 100, 255, 0.2);
      color: #aaa;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer
    }

    #legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 100, 255, 0.15);
      border-radius: 10px;
      padding: 12px;
      font-size: 11px;
      z-index: 10
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%
    }

    #tooltip {
      position: absolute;
      background: rgba(10, 10, 30, 0.9);
      border: 1px solid rgba(120, 120, 255, 0.3);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      pointer-events: none;
      display: none;
      z-index: 20;
      white-space: nowrap
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #08080f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity .5s
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(120, 120, 255, 0.15);
      border-top-color: #7c7cff;
      border-radius: 50%;
      animation: spin 1s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="spinner"></div>
  </div>
  <header>
    <h1>🦴 Person-in-WiFi-3D — GT Skeleton Viewer</h1>
    <span id="file-info">Loading...</span>
  </header>
  <main>
    <div id="video-panel">
      <div class="placeholder" id="video-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <polygon points="10,8 16,12 10,16" />
        </svg>
        <p>No video loaded<br>Set <code>VIDEO_PATH</code> in<br><code>skeleton_viewer.py</code></p>
      </div>
      <video id="video-player" style="display:none" controls></video>
    </div>
    <div id="skeleton-panel">
      <div id="legend"></div>
      <div id="tooltip"></div>
    </div>
  </main>
  <div id="controls">
    <button class="ctrl-btn" id="prev-btn" title="Previous frame">◀</button>
    <button class="ctrl-btn" id="play-btn" title="Play/Pause">▶</button>
    <button class="ctrl-btn" id="next-btn" title="Next frame">▶</button>
    <input type="range" id="frame-slider" min="0" max="0" value="0">
    <span id="frame-counter">0 / 0</span>
    <select id="fps-select" title="Playback FPS">
      <option value="auto" selected>Auto FPS</option>
      <option value="5">5 FPS</option>
      <option value="10">10 FPS</option>
      <option value="15">15 FPS</option>
      <option value="30">30 FPS</option>
    </select>
    <button class="ctrl-btn" id="label-btn" title="Toggle labels">A</button>
  </div>

  <script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.162.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.162.0/examples/jsm/"}}
</script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ----------------------------------------------------------------
    // All skeleton config (keypoints, edges, colors) is fetched from
    // /api/config served by skeleton_viewer.py — do NOT hardcode here.
    // ----------------------------------------------------------------
    let CFG = null;          // skeleton config from server
    let appData = null;      // frame data from server
    let currentFrame = 0, isPlaying = false, playInterval = null, showLabels = false;
    let autoFps = 15;
    const PERSON_HUES = [0, 0.3, 0.6, 0.15, 0.45, 0.75];

    // Three.js setup
    const container = document.getElementById('skeleton-panel');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x08080f);
    const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 0.3;
    controls.maxDistance = 20;

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(3, 5, 3);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(6, 30, 0x1a1a2e, 0x12121f);
    scene.add(grid);
    scene.add(new THREE.AxesHelper(0.5));

    let personGroups = [];

    // Convert hex string "#RRGGBB" → THREE.Color
    function hexColor(s) { return new THREE.Color(parseInt(s.replace('#', '0x'))); }

    function createPersonSkeleton(personIdx) {
      const group = new THREE.Group();
      const hue = PERSON_HUES[personIdx % PERSON_HUES.length];
      const joints = [], labels = [], bones = [];

      for (let i = 0; i < CFG.keypoint_names.length; i++) {
        const c = hexColor(CFG.joint_colors[i]);
        if (personIdx > 0) c.offsetHSL(hue, 0, 0);
        const mat = new THREE.MeshStandardMaterial({ color: c, emissive: c, emissiveIntensity: 0.4, roughness: 0.3, metalness: 0.2 });
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.018, 12, 12), mat);
        group.add(mesh);
        joints.push(mesh);

        const div = document.createElement('div');
        div.style.cssText = 'color:#fff;font-size:9px;background:rgba(0,0,0,0.6);padding:1px 4px;border-radius:3px;white-space:nowrap;pointer-events:none';
        div.textContent = CFG.keypoint_names[i];
        const lbl = new CSS2DObject(div);
        lbl.position.set(0, 0.03, 0);
        mesh.add(lbl);
        lbl.visible = showLabels;
        labels.push(lbl);
      }

      for (let i = 0; i < CFG.edges.length; i++) {
        const c = hexColor(CFG.edge_colors[i]);
        if (personIdx > 0) c.offsetHSL(hue, 0, 0);
        const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const mat = new THREE.LineBasicMaterial({ color: c, linewidth: 2 });
        const line = new THREE.Line(geo, mat);
        group.add(line);
        bones.push(line);
      }

      scene.add(group);
      return { group, joints, bones, labels };
    }

    // Convert data coords → Three.js coords using axis_mapping from config
    // Server sends: {"x":"data_x", "y":"-data_z", "z":"-data_y"}
    function toThree(kpt) {
      return [kpt[0], -kpt[2], -kpt[1]]; // X=data_x, Y=-data_z, Z=-data_y
    }

    function updatePose(frameData) {
      const numPersons = frameData.length;
      while (personGroups.length < numPersons) personGroups.push(createPersonSkeleton(personGroups.length));
      for (let p = 0; p < personGroups.length; p++) personGroups[p].group.visible = (p < numPersons);

      for (let p = 0; p < numPersons; p++) {
        const kpts = frameData[p];
        const pg = personGroups[p];
        for (let i = 0; i < CFG.keypoint_names.length; i++) {
          const [tx, ty, tz] = toThree(kpts[i]);
          pg.joints[i].position.set(tx, ty, tz);
        }
        for (let i = 0; i < CFG.edges.length; i++) {
          const [a, b] = CFG.edges[i];
          const pos = pg.bones[i].geometry.attributes.position.array;
          const [ax, ay, az] = toThree(kpts[a]);
          const [bx, by, bz] = toThree(kpts[b]);
          pos[0] = ax; pos[1] = ay; pos[2] = az;
          pos[3] = bx; pos[4] = by; pos[5] = bz;
          pg.bones[i].geometry.attributes.position.needsUpdate = true;
        }
      }
    }

    function fitCamera() {
      if (!appData || !appData.frames.length) return;
      let cx = 0, cy = 0, cz = 0, n = 0;
      for (const person of appData.frames[0]) {
        for (const kpt of person) { const [tx, ty, tz] = toThree(kpt); cx += tx; cy += ty; cz += tz; n++; }
      }
      cx /= n; cy /= n; cz /= n;
      controls.target.set(cx, cy, cz);
      camera.position.set(cx + 2, cy + 1.5, cz + 2);
      grid.position.y = cy - 0.8;
      controls.update();
    }

    function onResize() {
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      labelRenderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    // UI refs
    const slider   = document.getElementById('frame-slider');
    const counter  = document.getElementById('frame-counter');
    const playBtn  = document.getElementById('play-btn');
    const prevBtn  = document.getElementById('prev-btn');
    const nextBtn  = document.getElementById('next-btn');
    const fpsSelect = document.getElementById('fps-select');
    const labelBtn = document.getElementById('label-btn');
    const video    = document.getElementById('video-player');
    const legendEl = document.getElementById('legend');

    function goToFrame(idx) {
      if (!appData) return;
      currentFrame = Math.max(0, Math.min(idx, appData.num_frames - 1));
      slider.value = currentFrame;
      counter.textContent = `${currentFrame + 1} / ${appData.num_frames}`;
      document.getElementById('file-info').textContent = appData.frame_names[currentFrame] || '';
      updatePose(appData.frames[currentFrame]);
      if (appData.has_video && video.duration) {
        video.currentTime = currentFrame / CFG.video_fps;
      }
    }

    slider.addEventListener('input', () => goToFrame(parseInt(slider.value)));
    prevBtn.addEventListener('click', () => { stopPlay(); goToFrame(currentFrame - 1); });
    nextBtn.addEventListener('click', () => { stopPlay(); goToFrame(currentFrame + 1); });

    function togglePlay() {
      if (isPlaying) { stopPlay(); return; }
      isPlaying = true;
      playBtn.textContent = '⏸';
      playBtn.classList.add('active');
      const fps = fpsSelect.value === 'auto' ? autoFps : parseInt(fpsSelect.value);
      playInterval = setInterval(() => {
        if (currentFrame >= appData.num_frames - 1) { goToFrame(0); return; }
        goToFrame(currentFrame + 1);
      }, 1000 / fps);
    }
    function stopPlay() {
      isPlaying = false;
      playBtn.textContent = '▶';
      playBtn.classList.remove('active');
      if (playInterval) clearInterval(playInterval);
      playInterval = null;
    }
    playBtn.addEventListener('click', togglePlay);
    fpsSelect.addEventListener('change', () => { if (isPlaying) { stopPlay(); togglePlay(); } });

    labelBtn.addEventListener('click', () => {
      showLabels = !showLabels;
      labelBtn.classList.toggle('active', showLabels);
      for (const pg of personGroups) for (const lbl of pg.labels) lbl.visible = showLabels;
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  { stopPlay(); goToFrame(currentFrame - 1); }
      else if (e.key === 'ArrowRight') { stopPlay(); goToFrame(currentFrame + 1); }
      else if (e.key === ' ')    { e.preventDefault(); togglePlay(); }
    });

    // ── Boot sequence: fetch config → fetch data → init ──────────────
    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        CFG = cfg;

        // Build legend from config
        legendEl.innerHTML = CFG.legend
          .map(item => `<div class="legend-item"><div class="legend-dot" style="background:${item.color}"></div>${item.label}</div>`)
          .join('');

        return fetch('/api/data');
      })
      .then(r => r.json())
      .then(data => {
        appData = data;
        slider.max = data.num_frames - 1;

        if (data.has_video) {
          document.getElementById('video-placeholder').style.display = 'none';
          video.style.display = 'block';
          video.src = data.video_url;
        }

        // Auto-calculate playback FPS from sparse frame numbers
        if (data.frame_names.length >= 2) {
          const nums = data.frame_names
            .map(n => { const m = n.match(/\d+$/); return m ? parseInt(m[0]) : 0; })
            .filter(x => x > 0);
          if (nums.length >= 2) {
            const span = nums[nums.length - 1] - nums[0];
            if (span > 0) {
              autoFps = Math.round(nums.length / (span / CFG.video_fps) * 10) / 10;
              console.log(`Auto FPS: ${autoFps} (${nums.length} frames over ${(span / CFG.video_fps).toFixed(1)}s)`);
            }
          }
        }
        fpsSelect.options[0].textContent = `Auto (${autoFps})`;

        onResize();
        goToFrame(0);
        fitCamera();
        document.getElementById('loading').classList.add('hidden');
      })
      .catch(err => {
        console.error(err);
        document.getElementById('loading').innerHTML = '<p style="color:#f44">Failed to load data. Is the server running?</p>';
      });
  </script>
</body>

</html>
